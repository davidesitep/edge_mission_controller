syntax = "proto3";

package CommandVelBridge;

service CommandVelBridgeService {
  rpc StreamCommandVels(Empty)
      returns (stream CommandVelCommand);
}

message Empty {}

message CommandVelCommand {
  int32 id = 1;
  float linear_velocity = 2;
  float angular_velocity = 3;
  int64 timestamp = 4;
}


